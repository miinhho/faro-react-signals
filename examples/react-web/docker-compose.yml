services:
  app:
    build:
      context: ../..
      dockerfile: examples/react-web/Dockerfile
    environment:
      VITE_FARO_COLLECTOR_URL: http://localhost:12347/collect
    ports:
      - "5173:5173"
    depends_on:
      - alloy

  alloy:
    image: grafana/alloy:v1.6.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "12345:12345"
      - "12347:12347"
    depends_on:
      - loki
      - tempo

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - loki
      - tempo

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317"

networks:
  default:
    name: faro-react-signals-example
